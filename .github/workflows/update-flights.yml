name: Update CX HKG Flights JSON

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 19:00 UTC = 03:00 HKT next day.
    - cron: "0 19 * * *"

permissions:
  contents: write

jobs:
  update-flights:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate flights.json from Aviation Edge
        env:
          AVIATION_EDGE_API_KEY: ${{ secrets.AVIATION_EDGE_API_KEY }}
          DAYS_AHEAD: "30"
          DEPARTURE_AIRPORT: "HKG"
          AIRLINE_IATA: "CX"
          OUTPUT_FILE: "flights.json"
        run: node scripts/update-flights.mjs

      - name: Commit updated flights.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update CX HKG flights.json"
          file_pattern: flights.json
